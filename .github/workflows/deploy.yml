name: Deploy Spring Service

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t typingstats-service .

      - name: Stop and remove old container
        run: |
          docker stop typingstats-service || true
          docker rm typingstats-service || true

      - name: Run new container
        run: |
          docker run -d \
            --name typingstats-service \
            -p 5000:8080 \
            --env-file /srv/typingstats/service/.env \
            --restart unless-stopped \
            typingstats-service

      - name: Notify Discord
        if: always()
        run: |
          STATUS="${{ job.status }}"
          COMMITS=$(git log -3 --pretty=format:"- %s (%an)")

          curl -H "Content-Type: application/json" \
          -X POST \
          -d "{
            \"content\": \" **Deploy $STATUS**\n\n ${{ github.repository }}\n https://github.com/${{ github.repository }}/commit/${{ github.sha }}\n\n Commits:\n$COMMITS\"
          }" \
          ${{ secrets.DISCORD_WEBHOOK }}